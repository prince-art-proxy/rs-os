<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
        />
        <title>Royal Source</title>

        <link rel="shortcut icon" content="favicon.webp" />

        <link rel="stylesheet" href="index.css" />

        <script src="/proxy/baremux/index.js" defer></script>
        <script src="/proxy/register-sw.js" defer></script>
        <script src="/proxy/search.js" defer></script>

        <script src="particles.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                particlesJS("particles-js", {
                    particles: {
                        number: {
                            value: 300,
                            density: { enable: true, value_area: 1000 }
                        },
                        color: { value: "#ffffff" },
                        shape: { type: "circle" },
                        opacity: {
                            value: 1,
                            random: true,
                            anim: { enable: true, speed: 0.5, opacity_min: 0.2, sync: false }
                        },
                        size: {
                            value: 2,
                            random: true
                        },
                        line_linked: {
                            enable: false
                        },
                        move: {
                            enable: true,
                            speed: 0.6,
                            direction: "bottom",
                            random: true,
                            straight: false,
                            out_mode: "out",
                            bounce: false
                        }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: {
                            onhover: { enable: false },
                            onclick: { enable: false },
                            resize: true
                        }
                    },
                    retina_detect: true
                });
            });
        </script>
        
        <script>
            "use strict";
            let connection;

            async function initBareMux() {
                try {
                    if (typeof BareMux === 'undefined') {
                        await new Promise((resolve, reject) => {
                            let attempts = 0;
                            const checkInterval = setInterval(() => {
                                if (typeof BareMux !== 'undefined') {
                                    clearInterval(checkInterval);
                                    resolve();
                                }
                                attempts++;
                                if (attempts > 50) {
                                    clearInterval(checkInterval);
                                    reject(new Error('BareMux failed to load'));
                                }
                            }, 100);
                        });
                    }

                    connection = new BareMux.BareMuxConnection("/proxy/baremux/worker.js");
                    console.log('BareMux initialized successfully');
                } catch (err) {
                    const error = document.getElementById("sj-error");
                    const errorCode = document.getElementById("sj-error-code");
                    if (error) error.textContent = "Failed to initialize BareMux.";
                    if (errorCode) errorCode.textContent = err.toString();
                    console.error('BareMux init error:', err);
                }
            }

            window.addEventListener('DOMContentLoaded', async () => {
                try {
                    await initBareMux();
                    
                    const form = document.getElementById("sj-form");
                    const address = document.getElementById("sj-address");
                    const searchEngine = document.getElementById("sj-search-engine");
                    const error = document.getElementById("sj-error");
                    const errorCode = document.getElementById("sj-error-code");

                    if (!form) {
                        console.error('Form not found');
                        return;
                    }

                    form.addEventListener("submit", async (event) => {
                        event.preventDefault();

                        if (!connection) {
                            error.textContent = "System not initialized yet. Please wait...";
                            return;
                        }

                        try {
                            if (typeof registerSW !== 'undefined') {
                                await registerSW();
                            }
                        } catch (err) {
                            error.textContent = "Failed to register service worker.";
                            errorCode.textContent = err.toString();
                            console.error('SW registration error:', err);
                            return;
                        }

                        let url;
                        try {
                            if (typeof search !== 'undefined') {
                                url = search(address.value, searchEngine.value);
                            } else {
                                url = address.value.includes('.') ? 
                                    (address.value.startsWith('http') ? address.value : 'https://' + address.value) :
                                    searchEngine.value.replace('%s', encodeURIComponent(address.value));
                            }
                        } catch (err) {
                            error.textContent = "Failed to process search query.";
                            errorCode.textContent = err.toString();
                            return;
                        }

                        let wispUrl = "wss://gointospace.app/wisp/";
                        
                        try {
                            const currentTransport = await connection.getTransport();
                            console.log('Current transport:', currentTransport);
                            
                            if (currentTransport !== "/proxy/libcurl/index.mjs") {
                                await connection.setTransport("/proxy/libcurl/index.mjs", [{ wisp: wispUrl }]);
                                console.log('Transport set to libcurl with wisp:', wispUrl);
                            }
                        } catch (err) {
                            error.textContent = "Failed to set transport.";
                            errorCode.textContent = err.toString();
                            console.error('Transport error:', err);
                            return;
                        }

                        try {
                            const newWindow = window.open();
                            if (newWindow) {
                                connection.send(url).then(response => {
                                    newWindow.location.href = url;
                                }).catch(err => {
                                    console.error('BareMux navigation error:', err);
                                    newWindow.location.href = url;
                                });
                            } else {
                                window.location.href = url;
                            }
                        } catch (err) {
                            error.textContent = "Failed to navigate.";
                            errorCode.textContent = err.toString();
                            console.error('Navigation error:', err);
                        }
                    });
                    
                    console.log('All systems initialized');
                } catch (err) {
                    console.error('Initialization failed:', err);
                }
            });
        </script>
    </head>

    <body>

        <div id="particles-js"></div>

        <div
            title="Royal Source"
            class="flex-center logo-wrapper header-center"
        >
            <img class="logo" src="rs.png" alt="Scramjet" />
            <h1>Royal Source</h1>
        </div>

        <div class="flex-center desc left-margin">
            <p>
                Made by AG =D (with help from BestSpark687090)
            </p>
        </div>

        <form id="sj-form" class="flex-center">
            <input
                id="sj-search-engine"
                value="https://duckduckgo.com/search?q=%s"
                type="hidden"
            />
            <input id="sj-address" type="text" placeholder="Search the web freely" />
        </form>

        <div class="desc left-margin">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
        </div>

        <footer>
            <div></div>
            <div>
                <span></span>
            </div>
        </footer>
    </body>
</html>
